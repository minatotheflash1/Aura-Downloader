<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA DOWNLOADER | Premium Extractor</title>
    <style>
        :root { --primary: #00d2ff; --accent: #00ff88; --dark: #0a0a12; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: radial-gradient(circle at top, #1a1a2e, #0a0a12); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 90%; max-width: 700px; animation: fadeIn 1s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; letter-spacing: 2px; }
        header h1 span { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
        header p { color: #aaa; margin-bottom: 2rem; }
        .main-box { background: var(--glass); backdrop-filter: blur(15px); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .input-area { display: flex; gap: 10px; margin-bottom: 25px; }
        input { flex: 1; padding: 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: #fff; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px var(--primary); }
        button { padding: 15px 35px; border-radius: 12px; border: none; background: linear-gradient(45deg, var(--primary), var(--accent)); color: #000; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 20px var(--primary); }
        .hidden { display: none; }
        .loading { margin: 20px 0; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result-card { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); pt: 20px; }
        #thumb { width: 100%; max-width: 350px; border-radius: 15px; margin-bottom: 15px; border: 2px solid var(--glass); }
        .dl-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 20px; }
        .dl-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; text-decoration: none; color: #fff; font-size: 13px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .dl-item:hover { background: var(--primary); color: #000; border-color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AURA <span>DOWNLOADER</span></h1>
            <p>Download Facebook, YouTube, TikTok & Instagram easily.</p>
        </header>
        <div class="main-box">
            <div class="input-area">
                <input type="text" id="videoUrl" placeholder="Enter video link here...">
                <button id="fetchBtn">FETCH</button>
            </div>
            <div id="loader" class="hidden">
                <div class="spinner"></div>
                <p>Extracting data from Aura server...</p>
            </div>
            <div id="result" class="hidden result-card">
                <img id="thumb" src="" alt="Thumbnail">
                <h3 id="videoTitle" style="font-size: 1.1rem; margin: 10px 0;"></h3>
                <p id="duration" style="color: var(--accent); font-weight: bold;"></p>
                <div id="dlOptions" class="dl-grid"></div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('fetchBtn').addEventListener('click', async () => {
            const url = document.getElementById('videoUrl').value.trim();
            if (!url) return alert("Please paste a link!");

            const loader = document.getElementById('loader');
            const result = document.getElementById('result');
            const dlOptions = document.getElementById('dlOptions');

            loader.classList.remove('hidden');
            result.classList.add('hidden');
            dlOptions.innerHTML = '';

            try {
                const res = await fetch('/api/fetch-video', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('thumb').src = data.thumbnail;
                    document.getElementById('videoTitle').innerText = data.title;
                    document.getElementById('duration').innerText = "Duration: " + data.duration;
                    
                    data.formats.forEach(f => {
                        const link = document.createElement('a');
                        link.href = f.url;
                        link.target = "_blank";
                        link.className = 'dl-item';
                        link.innerHTML = `<strong>${f.quality}</strong><br>${f.ext.toUpperCase()} - ${f.size}`;
                        dlOptions.appendChild(link);
                    });
                    result.classList.remove('hidden');
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("Server error! Please try again.");
            } finally {
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
